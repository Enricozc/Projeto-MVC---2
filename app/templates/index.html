<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao Sistema</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 18px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .container h1 {
            font-size: 38px;
            color: #222;
            margin-bottom: 15px;
        }

        .container p {
            color: #666;
            margin-bottom: 35px;
            font-size: 18px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login {
            background: #4f46e5;
            color: white;
        }

        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }

        .btn-register {
            background: #06b6d4;
            color: white;
        }

        .btn-register:hover {
            background: #0891b2;
            transform: translateY(-2px);
        }

        @media (max-width: 500px) {
            .container {
                padding: 35px 25px;
            }

            .container h1 {
                font-size: 30px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Bem-vindo ao Sistema MVC</h1>

        <p>
            Faça login para acessar sua conta ou crie uma nova conta para começar.
        </p>

        <div class="buttons">
            <a href="/auth/login" class="btn btn-login">
                Entrar
            </a>

            <a href="/auth/cadastro" class="btn btn-register">
                Criar Conta
            </a>
        </div>
    </div>

</body>
</html>
